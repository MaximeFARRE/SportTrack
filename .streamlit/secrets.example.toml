# Copy this file to .streamlit/secrets.toml and fill in your own values.
# Never commit secrets.toml — it is listed in .gitignore.

APP_NAME = "SportTrack"
APP_VERSION = "0.1.0"

# SQLite (default, no setup needed)
DATABASE_URL = "sqlite:///./sporttrack.db"
# PostgreSQL example:
# DATABASE_URL = "postgresql://user:password@localhost:5432/sporttrack"

# Strava OAuth — https://www.strava.com/settings/api
STRAVA_CLIENT_ID = "your_client_id_here"
STRAVA_CLIENT_SECRET = "your_client_secret_here"
STRAVA_REDIRECT_URI = "http://localhost:18501"
STRAVA_SCOPE = "read,activity:read_all"
